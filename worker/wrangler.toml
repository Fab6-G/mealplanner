# wrangler.toml
name = "mealplanner-api"
main = "src/index.js"
compatibility_date = "2026-05-26"

# Route API endpoints (locally it runs on localhost:8787, in production it can route /api/*)
# Binding for D1 database
[[d1_databases]]
binding = "DB"
database_name = "mealplanner-db"
database_id = "6cb48ac0-a8ce-4c76-88ab-31a0c2a228c7" 
migrations_dir = "migrations"
